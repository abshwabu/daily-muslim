<body class="min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary-container selection:text-on-primary-container">
<!-- Decorative Organic Background Elements -->
<div class="fixed inset-0 z-[-1] overflow-hidden">
<div class="absolute -top-24 -right-24 w-96 h-96 rounded-full bg-primary-container/20 blur-3xl"></div>

</div>
<!-- Main Auth Canvas -->

<header class="text-center space-y-4">
<div class="flex justify-center mb-8">
<div class="w-16 h-16 rounded-3xl bg-surface-container-highest flex items-center justify-center rotate-3">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">spa</span>
</div>
</div>
<h1 class="text-3xl font-extrabold tracking-tight text-on-background uppercase">The Sacred Pause</h1>
<p class="text-on-surface-variant font-light leading-relaxed">A sanctuary for your intentional day.</p>
</header>
<!-- Form Card -->
<div class="glass-card rounded-3xl p-8 soft-shadow space-y-8">
<!-- Toggle Tabs (Subtle Layout) -->
<div class="flex p-1 bg-surface-container-low rounded-full">
<button class="flex-1 py-2 text-sm font-semibold rounded-full bg-white text-on-background shadow-sm">Sign In</button>
<button class="flex-1 py-2 text-sm font-medium rounded-full text-on-surface-variant hover:text-on-background transition-colors">Register</button>
</div>
<!-- Login Form -->
<form class="space-y-6">
<div class="space-y-1.5">
<label class="text-[11px] font-bold uppercase tracking-widest text-on-surface-variant px-1" for="email">Email Address</label>
<input class="w-full px-4 py-4 bg-surface-container-highest/30 border-none rounded-2xl focus:ring-2 focus:ring-primary-container placeholder:text-outline/50 text-on-background transition-all" id="email" placeholder="name@example.com" type="email"/>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-[11px] font-bold uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
<a class="text-[11px] font-bold uppercase tracking-widest text-primary hover:opacity-80 transition-opacity" href="#">Forgot?</a>
</div>
<input class="w-full px-4 py-4 bg-surface-container-highest/30 border-none rounded-2xl focus:ring-2 focus:ring-primary-container placeholder:text-outline/50 text-on-background transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full sage-gradient text-on-primary font-semibold py-4 rounded-full active:scale-95 transition-transform duration-200 shadow-lg shadow-primary/20" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-surface-container-highest"></div>
<span class="flex-shrink mx-4 text-[10px] font-bold uppercase tracking-[0.2em] text-outline-variant">Or continue with</span>
<div class="flex-grow border-t border-surface-container-highest"></div>
</div>
<!-- Social Auth -->
<button class="w-full flex items-center justify-center gap-3 bg-surface-container-lowest border border-outline-variant/10 py-4 rounded-full hover:bg-surface-container-low transition-colors duration-300 active:scale-95">
