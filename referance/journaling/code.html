<!DOCTYPE html>

<style>
        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .writing-area:focus { outline: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e3e3db; border-radius: 10px; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-white/70 dark:bg-zinc-900/70 backdrop-blur-xl text-stone-700 dark:text-stone-200 font-manrope font-light tracking-tight docked full-width top-0 sticky z-50 shadow-[0_10px_30px_rgba(49,51,46,0.04)] flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-highest overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Soft focused portrait of a calm person in a natural lit room, high-end photography style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBHqrqd-QUoi11oFlh21kKIDW-Xlb8sFuv0VeNousmjSwOw9IWDSP7TmcQK_NnEVEWT_pLSFIXNo3imL328ces_xlGzTSTlJAiKKoA3qSM4CDk3gul1qotYzksaiS7MB6IaPz4rE35q9i0RIfLx7fwE_8W3AoEsXUJzaWpXiQJ1s9K1h7VPsCFlGDXtUpLWZxRmZD3unvMhYZmqmc5_yUXrTaFQu7kH-GLoth_VFZ2E71gl6uvyd8Y6iCCcoVa_0SUqidHILlQm0x4"/>
</div>
</div>
<h1 class="text-lg font-semibold tracking-widest uppercase text-stone-800 dark:text-stone-100">The Sacred Pause</h1>
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-stone-700 dark:text-stone-200" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col max-w-2xl mx-auto w-full px-6 py-12 md:py-20">
<!-- Prompt of the Day (Bento/Card) -->
<section class="mb-12">
<div class="bg-surface-container-low rounded-xl p-8 relative overflow-hidden group transition-all duration-500">
<!-- Abstract Accent -->
<div class="absolute -right-12 -top-12 w-48 h-48 bg-primary-container/30 rounded-full blur-3xl group-hover:scale-110 transition-transform duration-700"></div>
<div class="relative z-10">
<span class="text-[10px] font-medium uppercase tracking-[0.2em] text-on-surface-variant mb-4 block">Prompt of the Day</span>
<h2 class="text-3xl md:text-4xl font-light tracking-tight leading-tight text-on-surface">
                        What are you grateful for in this quiet moment?
                    </h2>
<div class="mt-6 flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-[18px]" data-icon="auto_awesome">auto_awesome</span>
<span class="text-sm font-medium">Reflection Guide</span>
</div>
</div>
</div>
</section>
<!-- Distraction-Free Writing Area -->
<section class="flex-grow flex flex-col">
<div class="flex items-center justify-between mb-8">
<div class="flex flex-col">
<time class="text-sm text-on-surface-variant font-medium">Monday, October 23</time>
<span class="text-[10px] uppercase tracking-widest text-outline">Session: 08:42 AM</span>
</div>
<div class="flex gap-4">
<button class="text-primary hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined" data-icon="format_size">format_size</span>
</button>
<button class="text-primary hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined" data-icon="palette">palette</span>
</button>
</div>
</div>
<textarea class="writing-area w-full flex-grow bg-transparent text-xl md:text-2xl font-light leading-relaxed text-on-surface placeholder:text-surface-container-highest resize-none border-none focus:ring-0 px-0" placeholder="Begin your reflection here..." spellcheck="false"></textarea>
</section>
<!-- Floating Action Component for Saving -->
<div class="mt-8 flex justify-end">
<button class="bg-gradient-to-br from-primary to-primary-dim text-on-primary px-8 py-3 rounded-full flex items-center gap-2 shadow-[0_10px_30px_rgba(49,51,46,0.1)] hover:scale-[1.02] active:scale-95 transition-all duration-300">
<span class="text-sm font-semibold tracking-wide uppercase">Save Reflection</span>
<span class="material-symbols-outlined text-[20px]" data-icon="done_all">done_all</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-6 left-0 right-0 z-50 flex justify-around items-center mx-auto max-w-md bg-white/70 dark:bg-zinc-900/70 backdrop-blur-xl rounded-full shadow-[0_10px_30px_rgba(49,51,46,0.06)] px-4 py-2">
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-5 py-2 hover:text-emerald-700 transition-colors active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="text-[10px] font-manrope font-medium uppercase tracking-widest mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-5 py-2 hover:text-emerald-700 transition-colors active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="event_note">event_note</span>
<span class="text-[10px] font-manrope font-medium uppercase tracking-widest mt-1">Plan</span>
</a>
<!-- Active Tab: Journal -->
<a class="flex flex-col items-center justify-center bg-emerald-100/50 dark:bg-emerald-900/30 text-emerald-900 dark:text-emerald-100 rounded-full px-5 py-2 active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="auto_stories" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
<span class="text-[10px] font-manrope font-medium uppercase tracking-widest mt-1">Journal</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-5 py-2 hover:text-emerald-700 transition-colors active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="text-[10px] font-manrope font-medium uppercase tracking-widest mt-1">Me</span>
</a>
</nav>
<!-- Visual Polish: Decorative corner element -->
<div class="fixed top-0 right-0 -z-10 opacity-20 pointer-events-none overflow-hidden h-96 w-96">
<div class="absolute top-0 right-0 w-[500px] h-[500px] bg-primary-container rounded-full blur-[120px] -translate-y-1/2 translate-x-1/2"></div>
</div>
</body></html>
